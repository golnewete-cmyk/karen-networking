<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karen Souza | Onboarding High-End</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@100;300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010208;
            --purple-main: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
        }

        .visual-aura {
            position: fixed;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% -20%, rgba(108, 92, 231, 0.15), transparent 70%);
            z-index: -1;
        }

        .form-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px 20px;
            text-align: center;
        }

        .header-form { margin-bottom: 50px; }

        .header-form h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            letter-spacing: 12px;
            background: linear-gradient(to bottom, #fff, #777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 900;
        }

        .header-form p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--purple-main);
            font-weight: 600;
        }

        form {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 50px;
            backdrop-filter: blur(15px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            text-align: left;
        }

        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }

        label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.5);
            font-weight: 700;
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 18px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            transition: 0.4s;
            border-radius: 0;
        }

        select option { background: #010208; color: #fff; }

        input:focus, select:focus {
            border-color: var(--purple-main);
            background: rgba(108, 92, 231, 0.08);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.1);
        }

        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1.5fr;
            gap: 10px;
        }

        .submit-btn {
            grid-column: span 2;
            margin-top: 20px;
            background: #fff;
            color: #000;
            padding: 22px;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.5s;
        }

        .submit-btn:hover {
            background: var(--purple-main);
            color: #fff;
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.5);
            transform: translateY(-3px);
        }

        footer {
            margin-top: 60px;
            padding: 40px;
            text-align: center;
            font-size: 0.55rem;
            letter-spacing: 5px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            form { grid-template-columns: 1fr; padding: 30px 20px; }
            .full-width { grid-column: span 1; }
            .header-form h1 { letter-spacing: 6px; }
        }
    </style>
</head>
<body>

    <div class="visual-aura"></div>

    <div class="form-container">
        <header class="header-form">
            <p>Onboarding Estratégico</p>
            <h1>CÍRCULO RESTRITO</h1>
        </header>

        <form action="https://docs.google.com/forms/d/e/1FAIpQLSfzXun7SdxAeHW6RD3FXiuLf14TXWpRUlLzGH8fZ5haIh-U-g/formResponse" method="POST">
            
            <div class="input-group full-width">
                <label>Nome do Membro</label>
                <input type="text" name="entry.655902294" placeholder="Nome Completo" required>
            </div>

            <div class="input-group">
                <label>WhatsApp</label>
                <input type="text" name="entry.2128207175" placeholder="+55 (00) 00000-0000" required>
            </div>

            <div class="input-group">
                <label>E-mail Corporativo</label>
                <input type="email" name="entry.1669864852" placeholder="contato@exemplo.com" required>
            </div>

            <div class="input-group">
                <label>CPF</label>
                <input type="text" name="entry.1685867063" placeholder="000.000.000-00" required>
            </div>

            <div class="input-group">
                <label>Valor Mensal</label>
                <input type="text" name="entry.971745504" placeholder="R$ 0.000,00" required>
            </div>

            <div class="input-group full-width">
                <label>Chave Pix para Recebimento (Karen)</label>
                <input type="text" name="entry.1483219488" placeholder="Digite a chave Pix (E-mail, CPF ou Aleatória)" required>
            </div>

            <div class="input-group full-width">
                <label>Prazo de Pagamento</label>
                <div class="date-row">
                    <select name="entry.509815525_day" required>
                        <option value="" disabled selected>Dia</option>
                        <script>for(let i=1; i<=31; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                    </select>
                    <select name="entry.509815525_month" required>
                        <option value="" disabled selected>Mês</option>
                        <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
                        <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
                        <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
                        <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                    </select>
                    <select name="entry.509815525_year" required>
                        <option value="" disabled selected>Ano</option>
                        <option value="2024">2024</option><option value="2025">2025</option>
                        <option value="2026">2026</option><option value="2027">2027</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn">Finalizar Onboarding</button>
        </form>
    </div>

    <footer>
        &copy; 2026 KAREN SOUZA | HIGH-END SOLUTIONS
    </footer>

</body>
</html>
